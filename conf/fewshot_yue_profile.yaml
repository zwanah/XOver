# C2 profile-DPP diversity variant (Cantonese / written colloquial, Traditional) — PLAIN demos.
# English demo pool; both score signals YUE-query-encoded with ml_8x. The profile kernel
# is stacked over ALL langs (bare base model, NOT the _YUE eval model) + suffixes.
# Operating point: lambda 0.3 (the established non-English diversity peak; see
#  internal experiment notes). lambda 0 == relevance top-k (no diversity).

pool:
  score_source_root: /path/to/OsmNL_source
  splits:
    train: [train_final.json]
    syn: [syn_final.json]
  size: 6180

eval:
  score_source_root: /path/to/XOver/dataset/OsmNL_cantonese
  files:
    dev: dev_final_cantonese.json
    test: test_final_cantonese.json

scores:
  root: /path/to/eval_backend/TACO/caculate_score/scores
  sim_encoder: qwen3_YUE
  influence_model: qwen3_qwen3_influence_ml_8x_euclidean_YUE   # quality term R(q,e): YUE influence
  # Profile kernel: stacked over ALL langs (BARE base, not the _YUE eval model) + suffixes.
  profile_influence_model: qwen3_qwen3_influence_ml_8x_euclidean
  profile_influence_suffixes: ["", "ZH", "JA"]

defaults:
  k: 6
  alpha: 0.2
  split: dev
  dedup_prefix_len: 80

select:
  method: dpp
  kernel_mode: profile
  M: 20
  lambda: 0.3          # non-English diversity op-point; lambda 0 == relevance top-k
  phi_mode: linear

run:
  out_dir: data/fewshot_yue_profile
